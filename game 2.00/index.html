    <!-- 🛠️ AUTOMATIC SERVICE WORKER REGISTERATION -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('Cyber Core Secure Connection Established! (SW Registered)'))
            .catch(err => console.log('Core Uplink Failed:', err));
        });
      }
    </script>
